<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Хаб «Мои Места»</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <a href="hub.html" class="logo" aria-label="Мои Места">
    <img src="assets/logo-horizontal.png" alt="Мои Места">
  </a>
  <div class="title">Хаб «Мои Места»</div>
  <nav class="role-switcher" id="role-switcher" hidden></nav>
  <div class="spacer"></div>
  <span id="user-email" style="font-size:13px;color:var(--muted);"></span>
  <button class="link" id="logout">Выйти</button>
</header>

<main class="container">
  <div class="login-card" style="margin:40px auto;max-width:640px;text-align:center;">
    <h1 id="greeting">Здравствуйте</h1>
    <p style="color:var(--muted);">Выберите кабинет для работы.</p>
    <div id="cabinet-grid" class="cabinet-grid" style="margin-top:24px;"></div>
    <p style="color:var(--muted);font-size:13px;margin-top:32px;">
      Ваши роли: <span id="roles-list">—</span>
    </p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/operator-auth.js"></script>
<script src="js/hub-routing.js"></script>
<script src="js/cabinet-shell.js"></script>
<script src="js/audit.js"></script>
<script>
(async () => {
  await cabinetShell.init({ greetingPrefix: 'Здравствуйте' });

  const row = await hubRouting.getCurrentUserRow();
  if (!row) return;
  const roles = row.roles || [];
  const grid = document.getElementById('cabinet-grid');
  const cards = cabinetShell.CABINETS
    .filter(c => roles.includes(c.role))
    .map(c => `<a href="${c.page}" class="cabinet-card"><div class="cabinet-label">${c.label}</div></a>`)
    .join('');
  grid.innerHTML = cards || '<p style="color:var(--muted);">Ролей не назначено. Обратитесь к администратору.</p>';
})();
</script>
</body>
</html>
