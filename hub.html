<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Хаб «Мои Места»</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <a href="hub.html" class="logo" aria-label="Мои Места">
    <img src="assets/logo-horizontal.png" alt="Мои Места">
  </a>
  <div class="title">Хаб «Мои Места»</div>
  <div class="spacer"></div>
  <span id="user-email" style="font-size:13px;color:var(--muted);"></span>
  <button class="link" id="logout">Выйти</button>
</header>

<main class="container">
  <div class="login-card" style="margin:60px auto;max-width:560px;text-align:center;">
    <h1 id="greeting">Здравствуйте</h1>
    <p style="color:var(--muted);">Кабинет в разработке.</p>
    <p style="color:var(--muted);font-size:13px;">Ваши роли: <span id="roles-list">—</span></p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/hub-routing.js"></script>
<script>
(async () => {
  const row = await hubRouting.getCurrentUserRow();
  if (!row) { location.replace('login.html'); return; }
  if (row.status === 'disabled') {
    await sb.auth.signOut();
    location.replace('login.html');
    return;
  }
  document.getElementById('user-email').textContent = row.email || '';
  const name = row.full_name && row.full_name.trim() ? row.full_name : (row.email || '');
  document.getElementById('greeting').textContent = 'Здравствуйте, ' + name;
  document.getElementById('roles-list').textContent =
    (row.roles && row.roles.length) ? row.roles.join(', ') : '—';

  document.getElementById('logout').addEventListener('click', async () => {
    await sb.auth.signOut();
    location.replace('login.html');
  });
})();
</script>
</body>
</html>
