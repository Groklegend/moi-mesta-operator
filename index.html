<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Мои места · Помощник оператору</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <a href="index.html" class="logo" aria-label="Мои Места">
      <img src="assets/logo-horizontal.png" alt="Мои Места">
    </a>
    <div class="title">Кабинет оператора</div>
  </div>
  <div class="spacer"></div>
  <div class="category-dropdown" id="cat-dropdown">
    <button class="cat-trigger" id="cat-trigger" type="button">
      <span class="emoji" id="cat-emoji">🗂️</span>
      <span id="cat-label">Все рубрики</span>
      <span class="arrow">▾</span>
    </button>
    <div class="cat-menu hidden" id="cat-menu"></div>
  </div>
  <nav class="mode-nav">
    <div class="mode-more" id="mode-more">
      <button class="mode-more-trigger active" id="mode-more-trigger" type="button" aria-haspopup="menu" aria-expanded="false">
        <span class="emoji" id="mode-more-emoji">📋</span>
        <span id="mode-more-label">Доска</span>
        <span class="arrow">▾</span>
      </button>
      <div class="mode-more-menu hidden" id="mode-more-menu" role="menu">
        <button class="mode-btn active" data-mode="leads" type="button" role="menuitem">
          <span>📋</span> Доска
        </button>
        <button class="mode-btn" data-mode="objections" type="button" role="menuitem">
          <span>💬</span> Возражения
        </button>
        <button class="mode-btn" data-mode="documents" type="button" role="menuitem">
          <span>📎</span> Документы
        </button>
        <button class="mode-btn" data-mode="motivation" type="button" role="menuitem">
          <span>📊</span> Мотивация
        </button>
      </div>
    </div>
  </nav>
  <button class="topbar-tab-btn" id="op-calls-tab-btn" type="button">
    <span>📞</span> Анализ звонков
  </button>
  <button class="btn primary op-topbar-btn" id="op-new-lead-topbar" type="button">＋ Новая заявка</button>
  <nav class="role-switcher" id="role-switcher" hidden></nav>
  <div class="operator-box" id="operator-box" hidden>
    <span class="op-name" id="op-name"></span>
    <span id="user-email" style="display:none;"></span>
    <button class="link logout-btn" id="op-logout" type="button" title="Выйти">Выйти</button>
  </div>
</header>

<main class="container wide" id="main">
  <div class="layout" id="layout">
    <aside class="sidebar" id="sidebar">
      <div class="search-wrap" id="search-wrap">
        <input id="search" type="search" placeholder="Поиск возражения…" autocomplete="off">
      </div>

      <div class="sidebar-section" id="search-results-section" hidden>
        <h2>Результаты поиска</h2>
        <div id="search-results" class="item-list"></div>
      </div>

      <div class="sidebar-section" id="general-section">
        <h2>Общие возражения</h2>
        <div id="general-list" class="item-list"></div>
      </div>

      <div class="sidebar-section" id="specific-section" hidden>
        <h2 id="specific-title">Специфичные</h2>
        <div id="specific-list" class="item-list"></div>
      </div>

      <div class="sidebar-section" id="docs-mode-section" hidden>
        <h2>Документы</h2>
        <div id="docs-mode-list" class="item-list"></div>
      </div>
    </aside>

    <section class="content" id="content">
      <div class="answer-area" id="answer-pane">
        <div class="placeholder">
          <span class="big-icon">💬</span>
          Выберите возражение слева — ответ появится здесь
        </div>
      </div>
      <div class="motivation-area" id="motivation-pane" hidden></div>
      <div class="leads-plus-area" id="leads-plus-pane" hidden></div>
      <div class="calls-area" id="calls-pane" hidden></div>
    </section>
  </div>
</main>

<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/operator-auth.js"></script>
<script src="js/hub-routing.js"></script>
<script src="js/cabinet-shell.js"></script>
<script src="js/audit.js"></script>
<script>
  // Гард: если нет сессии — сразу на логин, до загрузки данных
  if (!operatorSession.require()) throw new Error('no-session');
  // Показать имя оператора и кнопку выхода
  (function () {
    const s = operatorSession.get();
    const box = document.getElementById('operator-box');
    document.getElementById('op-name').textContent = s.name;
    box.hidden = false;
    document.getElementById('op-logout').addEventListener('click', () => {
      sb.auth.signOut().finally(() => operatorSession.logout());
    });
  })();
  // Колокольчик уведомлений + переключатель ролей — только если оператор
  // вошёл через Supabase Auth (legacy-вход не имеет JWT, RLS закроет доступ).
  sb.auth.getSession().then(async ({ data }) => {
    if (!data?.session) return;
    if (cabinetShell.startBellPolling) cabinetShell.startBellPolling(data.session.user.id);
    if (window.hubRouting && cabinetShell.renderRoleSwitcher) {
      const row = await hubRouting.getCurrentUserRow();
      if (row?.roles?.length >= 2) cabinetShell.renderRoleSwitcher(row.roles);
    }
  });
</script>
<script src="js/operator.js"></script>
<script src="js/motivation.js"></script>
<script src="js/operator-leads.js"></script>
<script src="js/operator-calls.js"></script>
</body>
</html>
