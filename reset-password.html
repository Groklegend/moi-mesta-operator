<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Восстановление пароля · Мои Места</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <a href="login.html" class="logo" aria-label="Мои Места">
    <img src="assets/logo-horizontal.png" alt="Мои Места">
  </a>
  <div class="title">Хаб «Мои Места»</div>
  </div>
  <div class="spacer"></div>
  <a href="login.html" style="font-size:13px;color:var(--muted);">← К входу</a>
</header>

<main>
  <div class="login-card">
    <!-- Шаг 1: ввод email — отправка письма -->
    <div id="step-request">
      <h1>Восстановление пароля</h1>
      <p style="color:var(--muted);font-size:14px;">
        Введите email — мы пришлём ссылку для задания нового пароля.
      </p>
      <form class="form-grid" id="request-form">
        <label>
          <div class="lbl">Email</div>
          <input type="email" id="email" required autocomplete="username">
        </label>
        <button type="submit" class="btn primary" id="request-btn">Прислать ссылку</button>
        <div class="error" id="request-error" hidden></div>
      </form>
    </div>

    <!-- Шаг 1.5: письмо отправлено -->
    <div id="step-sent" hidden>
      <h1>Письмо отправлено</h1>
      <p>Если такой email есть в системе, на него ушла ссылка для сброса пароля.
         Откройте письмо и перейдите по ссылке.</p>
      <p style="color:var(--muted);font-size:13px;">Не пришло за 5 минут — проверьте «Спам».</p>
    </div>

    <!-- Шаг 2: задание нового пароля (после клика по ссылке из письма) -->
    <div id="step-set" hidden>
      <h1>Новый пароль</h1>
      <form class="form-grid" id="set-form">
        <label>
          <div class="lbl">Новый пароль</div>
          <input type="password" id="password" required minlength="8" autocomplete="new-password">
        </label>
        <label>
          <div class="lbl">Повторите пароль</div>
          <input type="password" id="password2" required minlength="8" autocomplete="new-password">
        </label>
        <button type="submit" class="btn primary" id="set-btn">Сохранить и войти</button>
        <div class="error" id="set-error" hidden></div>
      </form>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/operator-auth.js"></script>
<script src="js/hub-routing.js"></script>
<script src="js/pwd-toggle.js"></script>
<script>
// На этой же странице обрабатываем оба сценария:
// (1) Юзер пришёл сам ввести email → отправляем resetPasswordForEmail.
// (2) Юзер пришёл по ссылке из письма (Supabase кладёт #access_token + type=recovery)
//     → у нас уже есть recovery-сессия, показываем форму нового пароля.

(async () => {
  // Supabase JS v2 авто-парсит hash; даём ему 200 мс.
  await new Promise(r => setTimeout(r, 200));

  const stepRequest = document.getElementById('step-request');
  const stepSent    = document.getElementById('step-sent');
  const stepSet     = document.getElementById('step-set');

  const isRecovery = location.hash.includes('type=recovery');
  const { data: { session } } = await sb.auth.getSession();

  if (isRecovery && session) {
    // Шаг 2 — форма нового пароля
    stepRequest.hidden = true;
    stepSet.hidden = false;

    const setForm = document.getElementById('set-form');
    const setBtn = document.getElementById('set-btn');
    const setErr = document.getElementById('set-error');

    setForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      setErr.hidden = true;
      const p1 = document.getElementById('password').value;
      const p2 = document.getElementById('password2').value;
      if (p1 !== p2) {
        setErr.textContent = 'Пароли не совпадают'; setErr.hidden = false; return;
      }
      if (p1.length < 8) {
        setErr.textContent = 'Минимум 8 символов'; setErr.hidden = false; return;
      }
      setBtn.disabled = true; setBtn.textContent = 'Сохраняем…';
      try {
        const { error } = await sb.auth.updateUser({ password: p1 });
        if (error) {
          setErr.textContent = 'Ошибка: ' + error.message;
          setErr.hidden = false;
          setBtn.disabled = false; setBtn.textContent = 'Сохранить и войти';
          return;
        }
        await hubRouting.redirectByRole();
      } catch (err) {
        setErr.textContent = 'Сбой: ' + (err?.message || err);
        setErr.hidden = false;
        setBtn.disabled = false; setBtn.textContent = 'Сохранить и войти';
      }
    });
  } else {
    // Шаг 1 — форма ввода email
    const reqForm = document.getElementById('request-form');
    const reqBtn = document.getElementById('request-btn');
    const reqErr = document.getElementById('request-error');

    reqForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      reqErr.hidden = true;
      reqBtn.disabled = true; reqBtn.textContent = 'Отправляем…';
      const email = document.getElementById('email').value.trim();
      try {
        const redirectTo = `${location.origin}/reset-password.html`;
        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
        if (error) {
          reqErr.textContent = 'Ошибка: ' + error.message;
          reqErr.hidden = false;
          reqBtn.disabled = false; reqBtn.textContent = 'Прислать ссылку';
          return;
        }
        // Не светим, есть ли такой email в системе — показываем единый success.
        stepRequest.hidden = true;
        stepSent.hidden = false;
      } catch (err) {
        reqErr.textContent = 'Сбой: ' + (err?.message || err);
        reqErr.hidden = false;
        reqBtn.disabled = false; reqBtn.textContent = 'Прислать ссылку';
      }
    });
  }
})();
</script>
</body>
</html>
