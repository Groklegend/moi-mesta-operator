<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход · Мои Места</title>
<meta http-equiv="refresh" content="0; url=login">
<link rel="canonical" href="login">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!--
  Старый legacy-вход оператора по таблице `operators` устарел после миграции
  на универсальный Хаб-вход (login.html через Supabase Auth). Страница
  оставлена только как редирект, чтобы старые ссылки и закладки продолжали
  работать. Запись Елены в legacy `operators` (login=elena, password=111111)
  не трогаем — она держит FK для `motivation_entries`, `stats` и т.д.
-->
<main style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;">
  <div style="max-width:520px;text-align:center;">
    <h1 style="margin:0 0 12px;font-size:22px;color:var(--navy,#1f2a44);">Вход переехал</h1>
    <p style="margin:0 0 20px;color:var(--muted,#6b7280);line-height:1.55;">
      Используйте универсальный вход в Хаб. Если у вас был короткий логин оператора —
      зайдите по email из приглашения.
    </p>
    <a href="login" style="display:inline-block;padding:12px 22px;background:#E07A3C;color:#fff;border-radius:10px;text-decoration:none;font-weight:600;">
      Перейти ко входу →
    </a>
  </div>
</main>
<script>
  // На случай, если meta-refresh не сработает.
  location.replace('login');
</script>
</body>
</html>
